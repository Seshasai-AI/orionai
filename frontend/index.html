<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>OrionAI — Intelligent Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="logo">
          <div class="logo-mark">
            <svg viewBox="0 0 28 28" fill="none">
              <circle cx="14" cy="4"  r="2.5" fill="white"/>
              <circle cx="22" cy="9"  r="1.8" fill="white" opacity=".7"/>
              <circle cx="6"  cy="9"  r="1.8" fill="white" opacity=".7"/>
              <circle cx="14" cy="14" r="3"   fill="white"/>
              <circle cx="21" cy="20" r="1.8" fill="white" opacity=".6"/>
              <circle cx="7"  cy="20" r="1.8" fill="white" opacity=".6"/>
              <circle cx="14" cy="25" r="2"   fill="white" opacity=".4"/>
            </svg>
          </div>
          <span>OrionAI</span>
        </div>
        <button class="icon-btn" id="sidebar-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <button class="new-btn" id="new-chat-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        New chat
      </button>

      <div class="history" id="chat-history">
        <p class="history-label">Recent</p>
      </div>

      <div class="sidebar-bottom">
        <div class="status-pill">
          <span class="green-dot"></span>
          <span id="model-display">Loading…</span>
        </div>
        <div class="status-pill" id="web-row" style="display:none">
          <span class="blue-dot"></span>
          <span>Web search ON</span>
        </div>
      </div>
    </aside>

    <!-- Overlay for mobile -->
    <div class="overlay" id="overlay"></div>

    <!-- Main -->
    <main class="main">

      <!-- Top bar -->
      <header class="topbar">
        <button class="icon-btn" id="menu-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <div class="topbar-center">
          <div class="topbar-mark">
            <svg viewBox="0 0 28 28" fill="none">
              <circle cx="14" cy="4"  r="2.5" fill="currentColor"/>
              <circle cx="22" cy="9"  r="1.8" fill="currentColor" opacity=".7"/>
              <circle cx="6"  cy="9"  r="1.8" fill="currentColor" opacity=".7"/>
              <circle cx="14" cy="14" r="3"   fill="currentColor"/>
              <circle cx="21" cy="20" r="1.8" fill="currentColor" opacity=".6"/>
              <circle cx="7"  cy="20" r="1.8" fill="currentColor" opacity=".6"/>
            </svg>
          </div>
          <span class="topbar-name">OrionAI</span>
        </div>
        <button class="icon-btn danger" id="clear-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/>
          </svg>
        </button>
      </header>

      <!-- Messages feed -->
      <div class="feed" id="feed">

        <!-- Welcome screen -->
        <div class="welcome" id="welcome">
          <div class="welcome-mark">
            <svg viewBox="0 0 56 56" fill="none">
              <circle cx="28" cy="7"  r="4"   fill="currentColor"/>
              <circle cx="44" cy="17" r="3"   fill="currentColor" opacity=".7"/>
              <circle cx="12" cy="17" r="3"   fill="currentColor" opacity=".7"/>
              <circle cx="28" cy="28" r="5.5" fill="currentColor"/>
              <circle cx="43" cy="40" r="3"   fill="currentColor" opacity=".6"/>
              <circle cx="13" cy="40" r="3"   fill="currentColor" opacity=".6"/>
              <circle cx="28" cy="50" r="3"   fill="currentColor" opacity=".4"/>
            </svg>
          </div>
          <h1 class="welcome-title">Hello, I'm OrionAI</h1>
          <p class="welcome-sub">Powered by Llama 3.3 · Real-time web search</p>
          <div class="chips" id="chips">
            <button class="chip" data-p="What's the latest news in AI today?">🌐 Latest AI news</button>
            <button class="chip" data-p="Who won yesterday's IPL 2026 match?">🏏 IPL match result</button>
            <button class="chip" data-p="Write a Python function to reverse a string">🐍 Python code help</button>
            <button class="chip" data-p="Give me 5 AI portfolio project ideas">💡 Portfolio ideas</button>
          </div>
        </div>

      </div>

      <!-- Input -->
      <div class="input-wrap">
        <div class="input-box" id="input-box">
          <textarea id="input" placeholder="Ask OrionAI anything…" rows="1" spellcheck="true"></textarea>
          <button class="send-btn" id="send-btn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
        <p class="fine-print">OrionAI can make mistakes. Verify important information.</p>
      </div>

    </main>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/static/js/app.js"></script>
</body>
</html>
