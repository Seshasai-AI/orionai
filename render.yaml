services:
  - type: web
    name: orionai
    runtime: python
    region: oregon          # free tier region
    plan: free

    # ── Build ───────────────────────────────────────────────
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt

    # ── Start ───────────────────────────────────────────────
    # gunicorn with uvicorn workers = production-grade ASGI
    # $PORT is automatically injected by Render
    startCommand: gunicorn backend.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --log-level info

    # ── Health check ────────────────────────────────────────
    healthCheckPath: /health

    # ── Environment variables ───────────────────────────────
    # Set GROQ_API_KEY and TAVILY_API_KEY manually in Render dashboard
    # Do NOT hardcode real keys here — this file goes to GitHub
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
      - key: MAX_TOKENS
        value: "1024"
      - key: GROQ_API_KEY
        sync: false        # means: set manually in dashboard
      - key: TAVILY_API_KEY
        sync: false        # means: set manually in dashboard
